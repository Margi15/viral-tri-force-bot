name: Viral Tri-Force Bot

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 17 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  viral-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Viral Bot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python src/main.py

      - name: Commit and push results
        run: |
          git config --global user.name 'Viral Bot'
          git config --global user.email 'bot@viral.com'
          git add output/ || true
          git commit -m "New viral content generated" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
